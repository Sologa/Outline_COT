experiment_id: 2026-05-24_tree50_v2_payload_outline_prompt_gpt5nano_batch
default_run_id: 2026-05-24T2045_taipei_no_abstract
status: provisional_with_abstract_ready

inputs:
  final_tree50_manifest: results/engineering_validation/2026-05-24_hf_meow_tree50_source_extraction_v2/_summaries/final_usable_tree50_v2_manifest.jsonl
  high261_metadata: data/paper_sets/hf_meow_raw_taxonomy_high261/metadata/hf_meow_raw_high261.jsonl
  high261_verified_metadata: data/paper_sets/hf_meow_raw_taxonomy_high261/metadata/hf_meow_raw_high261.with_verified_metadata.jsonl
