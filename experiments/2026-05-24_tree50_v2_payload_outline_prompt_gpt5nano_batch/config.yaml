  source: final_usable_tree50_v2_manifest
  source_mix:
    original_tree50_success: 41
    replacement_success: 9

matrix:
  input_conditions:
    - no_abstract
    - with_abstract
  run_now:
    - with_abstract
  completed:
    - no_abstract
  variants:
    - baseline_no_taxonomy
    - tree_only_guarded
    - structural_complete_guarded

judge:
  backend: codex
  model: gpt-5.5
  reasoning_effort: high
  concurrency: 2
  timeout_seconds: 600
  max_retries: 2

notes:
  - no_abstract was the first pass.
  - with_abstract uses high261_verified_metadata so verified reference abstracts are included without mutating the original high261 metadata file.
