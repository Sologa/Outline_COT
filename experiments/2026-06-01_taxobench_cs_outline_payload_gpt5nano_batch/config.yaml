    - tree_with_papers

projection:
  status: planned_not_implemented
  source_payload: TaxoBench-CS taxo_tree
  definition_policy: do_not_generate_or_impute
  flat_concepts: remove parent-child hierarchy and keep concept labels plus descendant paper leaves
  random_hierarchy: preserve concept labels and paper evidence; randomize hierarchy deterministically
  tree_only_guarded: render taxonomy labels plus paper identity leaves
  tree_with_papers: render taxonomy labels plus leaf paper id/title/year/external ids
  random_seed_base: taxobench_cs_outline_payload_v1

judge:
