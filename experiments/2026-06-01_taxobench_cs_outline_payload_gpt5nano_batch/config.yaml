  random_hierarchy: preserve concept labels only and randomize hierarchy deterministically
  tree_only_guarded: render taxonomy labels only and omit raw Semantic Scholar paperId membership leaves
  tree_with_papers: render taxonomy labels plus title-only reference paper leaves
  random_seed_base: taxobench_cs_outline_payload_v1

