  batch_discount: 0.5
  gpt_5_nano_standard_usd_per_1m:
    input: 0.05
    cached_input: 0.005
    output: 0.40
  note: Batch cost is computed at 50 percent of standard input, cached input, and output rates. Reasoning tokens are included in output tokens when reported by the API. The initial 12000-token cap attempt exhausted all output tokens on reasoning and is archived under the result batch attempt folder.

